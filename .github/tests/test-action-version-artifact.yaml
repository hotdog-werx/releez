name: Test Action — version-artifact mode

# Run manually or via act:
#   act workflow_dispatch -W .github/tests/test-action-version-artifact.yaml
on:
  workflow_dispatch:
  workflow_call:

jobs:

  # ── Prerelease matrix ───────────────────────────────────────────────────────
  #
  # Covers all three prerelease types (alpha/beta/rc) across all three version
  # schemes (semver/docker/pep440), using version-override to skip git-cliff.
  test-version-artifact-prerelease:
    name: version-artifact prerelease (${{ matrix.case }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - case: prerelease-beta
            version-override: '2.0.0'
            prerelease-type: 'beta'
            prerelease-number: '123'
            is-full-release: 'false'
            alias-versions: 'none'
            expect-semver: '2.0.0-beta123+456'
            expect-docker: '2.0.0-beta123-456'
            expect-pep440: '2.0.0b123.dev456'

          - case: prerelease-alpha
            version-override: '2.0.0'
            prerelease-type: 'alpha'
            prerelease-number: '234'
            is-full-release: 'false'
            alias-versions: 'none'
            expect-semver: '2.0.0-alpha234+456'
            expect-docker: '2.0.0-alpha234-456'
            expect-pep440: '2.0.0a234.dev456'

          - case: prerelease-rc
            version-override: '3.1.0'
            prerelease-type: 'rc'
            prerelease-number: '7'
            is-full-release: 'false'
            alias-versions: 'none'
            expect-semver: '3.1.0-rc7+456'
            expect-docker: '3.1.0-rc7-456'
            expect-pep440: '3.1.0rc7.dev456'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Run action (${{ matrix.case }})
        id: version
        uses: ./
        with:
          mode: version-artifact
          version-override: ${{ matrix.version-override }}
          prerelease-type: ${{ matrix.prerelease-type }}
          prerelease-number: ${{ matrix.prerelease-number }}
          is-full-release: ${{ matrix.is-full-release }}
          alias-versions: ${{ matrix.alias-versions }}

      - name: Assert outputs (${{ matrix.case }})
        env:
          ACTUAL_SEMVER: ${{ steps.version.outputs.semver-versions }}
          ACTUAL_DOCKER: ${{ steps.version.outputs.docker-versions }}
          ACTUAL_PEP440: ${{ steps.version.outputs.pep440-versions }}
          EXPECT_SEMVER: ${{ matrix.expect-semver }}
          EXPECT_DOCKER: ${{ matrix.expect-docker }}
          EXPECT_PEP440: ${{ matrix.expect-pep440 }}
        run: |
          fail=0

          assert_eq() {
            local name="$1" actual="$2" expected="$3"
            if [ "$actual" = "$expected" ]; then
              echo "OK [${{ matrix.case }}]: $name"
            else
              echo "FAIL [${{ matrix.case }}]: $name"
              printf '  expected: %q\n' "$expected"
              printf '  actual:   %q\n' "$actual"
              fail=1
            fi
          }

          assert_eq "semver-versions" "$ACTUAL_SEMVER" "$EXPECT_SEMVER"
          assert_eq "docker-versions" "$ACTUAL_DOCKER" "$EXPECT_DOCKER"
          assert_eq "pep440-versions" "$ACTUAL_PEP440" "$EXPECT_PEP440"

          exit $fail
        shell: bash

  # ── Full release alias matrix ───────────────────────────────────────────────
  #
  # Verifies alias-versions produces the correct extra tags for full releases,
  # and that pep440 never includes aliases regardless of the setting.

  test-version-artifact-full-release:
    name: version-artifact full release (${{ matrix.case }})
    needs: [test-version-artifact-prerelease]
    if: always()
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - case: full-release-no-alias
            version-override: '1.2.3'
            alias-versions: 'none'
            expect-semver: '1.2.3'
            expect-docker: '1.2.3'
            expect-pep440: '1.2.3'

          - case: full-release-major-alias
            version-override: '2.0.0'
            alias-versions: 'major'
            expect-semver: |-
              2.0.0
              v2
            expect-docker: |-
              2.0.0
              v2
            expect-pep440: '2.0.0'

          - case: full-release-minor-alias
            version-override: '3.4.0'
            alias-versions: 'minor'
            expect-semver: |-
              3.4.0
              v3
              v3.4
            expect-docker: |-
              3.4.0
              v3
              v3.4
            expect-pep440: '3.4.0'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Run action (${{ matrix.case }})
        id: version
        uses: ./
        with:
          mode: version-artifact
          version-override: ${{ matrix.version-override }}
          is-full-release: 'true'
          alias-versions: ${{ matrix.alias-versions }}

      - name: Assert outputs (${{ matrix.case }})
        env:
          ACTUAL_SEMVER: ${{ steps.version.outputs.semver-versions }}
          ACTUAL_DOCKER: ${{ steps.version.outputs.docker-versions }}
          ACTUAL_PEP440: ${{ steps.version.outputs.pep440-versions }}
          EXPECT_SEMVER: ${{ matrix.expect-semver }}
          EXPECT_DOCKER: ${{ matrix.expect-docker }}
          EXPECT_PEP440: ${{ matrix.expect-pep440 }}
        run: |
          fail=0

          assert_eq() {
            local name="$1" actual="$2" expected="$3"
            if [ "$actual" = "$expected" ]; then
              echo "OK [${{ matrix.case }}]: $name"
            else
              echo "FAIL [${{ matrix.case }}]: $name"
              printf '  expected: %q\n' "$expected"
              printf '  actual:   %q\n' "$actual"
              fail=1
            fi
          }

          assert_eq "semver-versions" "$ACTUAL_SEMVER" "$EXPECT_SEMVER"
          assert_eq "docker-versions" "$ACTUAL_DOCKER" "$EXPECT_DOCKER"
          # pep440 never includes alias versions
          assert_eq "pep440-versions" "$ACTUAL_PEP440" "$EXPECT_PEP440"

          # Ordering guarantee: first line must always be the exact version, never an alias
          assert_eq "semver-versions[0] is exact" "$(echo "$ACTUAL_SEMVER" | head -1)" "${{ matrix.version-override }}"
          assert_eq "docker-versions[0] is exact" "$(echo "$ACTUAL_DOCKER" | head -1)" "${{ matrix.version-override }}"

          exit $fail
        shell: bash

  # ── Pre-installed uv ────────────────────────────────────────────────────────
  #
  # Verifies the action works when uv is already present — the action must skip
  # installation rather than reinstalling.

  test-version-artifact-preinstalled-uv:
    name: version-artifact preinstalled uv
    needs: [test-version-artifact-full-release]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Pre-install uv
        uses: astral-sh/setup-uv@v7

      - name: Run action (preinstalled-uv)
        id: version
        uses: ./
        with:
          mode: version-artifact
          version-override: '3.0.0'
          prerelease-type: 'rc'
          prerelease-number: '7'
          is-full-release: 'false'
          alias-versions: 'none'

      - name: Assert outputs (preinstalled-uv)
        run: |
          fail=0

          assert_eq() {
            local name="$1" actual="$2" expected="$3"
            if [ "$actual" = "$expected" ]; then
              echo "OK [preinstalled-uv]: $name"
            else
              echo "FAIL [preinstalled-uv]: $name"
              printf '  expected: %q\n' "$expected"
              printf '  actual:   %q\n' "$actual"
              fail=1
            fi
          }

          assert_eq "semver-versions" "${{ steps.version.outputs.semver-versions }}" "3.0.0-rc7+456"
          assert_eq "docker-versions" "${{ steps.version.outputs.docker-versions }}" "3.0.0-rc7-456"
          assert_eq "pep440-versions" "${{ steps.version.outputs.pep440-versions }}" "3.0.0rc7.dev456"

          exit $fail
        shell: bash

  # ── Git-based version detection ─────────────────────────────────────────────
  #
  # Creates a git tag and a feat commit, then lets git-cliff auto-bump the
  # minor version. No version-override — the action must derive the base
  # version from git history.

  test-version-artifact-git-detection:
    name: version-artifact git detection
    needs: [test-version-artifact-preinstalled-uv]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up git and create baseline tag
        run: |
          git config user.email "test@example.com"
          git config user.name "Test"
          git tag 100.0.0
          git commit --allow-empty -m "feat: trigger minor bump"
        shell: bash

      - name: Run action (git-detection, prerelease)
        id: version
        uses: ./
        with:
          mode: version-artifact
          prerelease-type: 'rc'
          prerelease-number: '1'
          is-full-release: 'false'
          alias-versions: 'none'

      - name: Assert outputs (git-detection)
        run: |
          fail=0

          assert_eq() {
            local name="$1" actual="$2" expected="$3"
            if [ "$actual" = "$expected" ]; then
              echo "OK [git-detection]: $name"
            else
              echo "FAIL [git-detection]: $name"
              printf '  expected: %q\n' "$expected"
              printf '  actual:   %q\n' "$actual"
              fail=1
            fi
          }

          # feat commit since 100.0.0 → git-cliff bumps minor → 100.1.0
          assert_eq "semver-versions" "${{ steps.version.outputs.semver-versions }}" "100.1.0-rc1+456"
          assert_eq "docker-versions" "${{ steps.version.outputs.docker-versions }}" "100.1.0-rc1-456"
          assert_eq "pep440-versions" "${{ steps.version.outputs.pep440-versions }}" "100.1.0rc1.dev456"

          exit $fail
        shell: bash

  # ── Detect from release branch ──────────────────────────────────────────────
  #
  # Simulates being on a release/2.3.4 branch. The action detects the version
  # from the branch name and formats it as a full release.

  test-version-artifact-detect-from-branch:
    name: version-artifact detect-from-branch
    needs: [test-version-artifact-git-detection]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Run action (detect-from-branch)
        id: version
        uses: ./
        with:
          mode: version-artifact
          detect-from-branch: 'true'
          branch: 'release/5.6.7'
          is-full-release: 'true'
          alias-versions: 'major'

      - name: Assert outputs (detect-from-branch)
        run: |
          fail=0

          assert_eq() {
            local name="$1" actual="$2" expected="$3"
            if [ "$actual" = "$expected" ]; then
              echo "OK [detect-from-branch]: $name"
            else
              echo "FAIL [detect-from-branch]: $name"
              printf '  expected: %q\n' "$expected"
              printf '  actual:   %q\n' "$actual"
              fail=1
            fi
          }

          assert_eq "release-version"  "${{ steps.version.outputs.release-version }}"  "5.6.7"
          assert_eq "semver-versions"  "${{ steps.version.outputs.semver-versions }}"  "$(printf '5.6.7\nv5')"
          assert_eq "docker-versions"  "${{ steps.version.outputs.docker-versions }}"  "$(printf '5.6.7\nv5')"
          assert_eq "pep440-versions"  "${{ steps.version.outputs.pep440-versions }}"  "5.6.7"

          exit $fail
        shell: bash

  # ── Monorepo project-scoped version detection ────────────────────────────────
  #
  # Sets up a monorepo with a "core" project (core-1.0.0 tag + feat commit),
  # then runs version-artifact with project: core. Expects git-cliff to auto-bump
  # minor → core-1.1.0, with correct project and release-version outputs.

  test-version-artifact-monorepo-project:
    name: version-artifact monorepo project
    needs: [test-version-artifact-detect-from-branch]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up git history and monorepo config
        run: |
          git config user.email "test@example.com"
          git config user.name "Test"

          mkdir -p packages/core
          echo "# core" > packages/core/README.md
          git add packages/core/README.md
          git commit -m "chore: add core package"

          git tag core-1.0.0
          echo "new feature" >> packages/core/README.md
          git add packages/core/README.md
          git commit -m "feat(core): new feature for core"

          cat >> pyproject.toml << 'TOML'

          [[tool.releez.projects]]
          name = "core"
          path = "packages/core"
          tag-prefix = "core-"
          changelog-path = "CHANGELOG.md"
          TOML
        shell: bash

      - name: Write test cliff.toml (no GitHub remote)
        run: |
          cat > cliff.toml << 'TOML'
          [changelog]
          body = """
          {% if version %}## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
          {% else %}## [unreleased]
          {% endif %}
          {% for group, commits in commits | group_by(attribute="group") %}
          ### {{ group | striptags | trim | upper_first }}
          {% for commit in commits %}
          - {% if commit.scope %}*({{ commit.scope }})* {% endif %}{{ commit.message | upper_first }}
          {% endfor %}
          {% endfor %}
          """
          trim = true
          render_always = true

          [git]
          conventional_commits = true
          filter_unconventional = true
          commit_parsers = [
            { message = "^feat", group = "Features" },
            { message = "^fix", group = "Bug Fixes" },
            { message = "^chore\\(release\\):", skip = true },
            { message = ".*", group = "Other" },
          ]
          filter_commits = false
          topo_order_commits = true
          sort_commits = "oldest"
          TOML
        shell: bash

      - name: Run action (monorepo project)
        id: version
        uses: ./
        with:
          mode: version-artifact
          project: 'core'
          prerelease-type: 'rc'
          prerelease-number: '1'
          build-number: '42'
          is-full-release: 'false'

      - name: Assert outputs (monorepo project)
        env:
          SEMVER_VERSIONS: ${{ steps.version.outputs.semver-versions }}
          DOCKER_VERSIONS: ${{ steps.version.outputs.docker-versions }}
          PEP440_VERSIONS: ${{ steps.version.outputs.pep440-versions }}
        run: |
          fail=0

          assert_eq() {
            local name="$1" actual="$2" expected="$3"
            if [ "$actual" = "$expected" ]; then
              echo "OK [monorepo-project]: $name"
            else
              echo "FAIL [monorepo-project]: $name"
              printf '  expected: %q\n' "$expected"
              printf '  actual:   %q\n' "$actual"
              fail=1
            fi
          }

          # feat commit since core-1.0.0 → git-cliff bumps minor → core-1.1.0
          assert_eq "release-version"  "${{ steps.version.outputs.release-version }}"  "core-1.1.0"
          assert_eq "project"          "${{ steps.version.outputs.project }}"           "core"
          assert_eq "semver-versions"  "$SEMVER_VERSIONS"                               "1.1.0-rc1+42"
          assert_eq "docker-versions"  "$DOCKER_VERSIONS"                               "1.1.0-rc1-42"
          assert_eq "pep440-versions"  "$PEP440_VERSIONS"                               "1.1.0rc1.dev42"

          exit $fail
        shell: bash

  # ── Monorepo — no existing tags (first release bootstrap) ────────────────────
  #
  # Sets up a monorepo "core" project with NO previous core-* tags, then runs
  # version-artifact with project: core. git-cliff defaults to 0.1.0 when no
  # releases are found, but fails its own validation because 0.1.0 doesn't match
  # ^core-(…)$. Releez must recover the intended version so the first release of
  # a brand-new monorepo project works without manual bootstrapping.

  test-version-artifact-monorepo-no-tags:
    name: version-artifact monorepo no existing tags
    needs: [test-version-artifact-monorepo-project]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up git history and monorepo config (no core-* tag)
        run: |
          git config user.email "test@example.com"
          git config user.name "Test"

          mkdir -p packages/core
          echo "# core" > packages/core/README.md
          git add packages/core/README.md
          git commit -m "feat(core): initial core package"
          # Intentionally NO core-* tag

          cat >> pyproject.toml << 'TOML'

          [[tool.releez.projects]]
          name = "core"
          path = "packages/core"
          tag-prefix = "core-"
          changelog-path = "CHANGELOG.md"
          TOML
        shell: bash

      - name: Write test cliff.toml (no GitHub remote)
        run: |
          cat > cliff.toml << 'TOML'
          [changelog]
          body = """
          {% if version %}## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
          {% else %}## [unreleased]
          {% endif %}
          {% for group, commits in commits | group_by(attribute="group") %}
          ### {{ group | striptags | trim | upper_first }}
          {% for commit in commits %}
          - {% if commit.scope %}*({{ commit.scope }})* {% endif %}{{ commit.message | upper_first }}
          {% endfor %}
          {% endfor %}
          """
          trim = true
          render_always = true

          [git]
          conventional_commits = true
          filter_unconventional = true
          commit_parsers = [
            { message = "^feat", group = "Features" },
            { message = "^fix", group = "Bug Fixes" },
            { message = "^chore\\(release\\):", skip = true },
            { message = ".*", group = "Other" },
          ]
          filter_commits = false
          topo_order_commits = true
          sort_commits = "oldest"
          TOML
        shell: bash

      - name: Run action (monorepo no-tags)
        id: version
        uses: ./
        with:
          mode: version-artifact
          project: 'core'
          prerelease-type: 'rc'
          prerelease-number: '1'
          build-number: '42'
          is-full-release: 'false'

      - name: Assert outputs (monorepo no-tags)
        env:
          SEMVER_VERSIONS: ${{ steps.version.outputs.semver-versions }}
          DOCKER_VERSIONS: ${{ steps.version.outputs.docker-versions }}
          PEP440_VERSIONS: ${{ steps.version.outputs.pep440-versions }}
        run: |
          fail=0

          assert_eq() {
            local name="$1" actual="$2" expected="$3"
            if [ "$actual" = "$expected" ]; then
              echo "OK [monorepo-no-tags]: $name"
            else
              echo "FAIL [monorepo-no-tags]: $name"
              printf '  expected: %q\n' "$expected"
              printf '  actual:   %q\n' "$actual"
              fail=1
            fi
          }

          # No core-* tags → git-cliff defaults to 0.1.0 → release-version = core-0.1.0
          assert_eq "release-version"  "${{ steps.version.outputs.release-version }}"  "core-0.1.0"
          assert_eq "project"          "${{ steps.version.outputs.project }}"           "core"
          assert_eq "semver-versions"  "$SEMVER_VERSIONS"                               "0.1.0-rc1+42"
          assert_eq "docker-versions"  "$DOCKER_VERSIONS"                               "0.1.0-rc1-42"
          assert_eq "pep440-versions"  "$PEP440_VERSIONS"                               "0.1.0rc1.dev42"

          exit $fail
        shell: bash
