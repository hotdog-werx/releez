name: Test Action — validate mode

# Run manually or via act:
#   act workflow_dispatch -W .github/tests/test-action-validate.yaml
on:
  workflow_dispatch:
  workflow_call:

jobs:

  # ── Single-repo validate ─────────────────────────────────────────────────────
  #
  # Validates the release preview and notes are generated correctly for a
  # single-repo release branch. PR comments are disabled (post-comment: false)
  # since there is no real PR in act or CI.
  test-validate-single-repo:
    name: validate single-repo
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up git history
        run: |
          git config user.email "test@example.com"
          git config user.name "Test"
          git tag 4.0.0
          git commit --allow-empty -m "feat: new capability"
        shell: bash

      - name: Write test cliff.toml (no GitHub remote)
        run: |
          cat > cliff.toml << 'TOML'
          [changelog]
          body = """
          {% if version %}## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
          {% else %}## [unreleased]
          {% endif %}
          {% for group, commits in commits | group_by(attribute="group") %}
          ### {{ group | striptags | trim | upper_first }}
          {% for commit in commits %}
          - {% if commit.scope %}*({{ commit.scope }})* {% endif %}{{ commit.message | upper_first }}
          {% endfor %}
          {% endfor %}
          """
          trim = true
          render_always = true

          [git]
          conventional_commits = true
          filter_unconventional = true
          commit_parsers = [
            { message = "^feat", group = "Features" },
            { message = "^fix", group = "Bug Fixes" },
            { message = "^chore\\(release\\):", skip = true },
            { message = ".*", group = "Other" },
          ]
          filter_commits = false
          topo_order_commits = true
          sort_commits = "oldest"
          TOML
        shell: bash

      - name: Run action (validate)
        id: releez
        uses: ./
        with:
          mode: validate
          branch: 'release/4.1.0'
          post-comment: 'false'

      - name: Assert outputs (validate)
        env:
          RELEASE_PREVIEW: ${{ steps.releez.outputs.release-preview }}
          RELEASE_NOTES: ${{ steps.releez.outputs.release-notes }}
        run: |
          fail=0

          assert_eq() {
            local name="$1" actual="$2" expected="$3"
            if [ "$actual" = "$expected" ]; then
              echo "OK [validate]: $name"
            else
              echo "FAIL [validate]: $name"
              printf '  expected: %q\n' "$expected"
              printf '  actual:   %q\n' "$actual"
              fail=1
            fi
          }

          assert_eq "release-version"    "${{ steps.releez.outputs.release-version }}"    "4.1.0"
          assert_eq "project"            "${{ steps.releez.outputs.project }}"             ""
          assert_eq "validation-status"  "${{ steps.releez.outputs.validation-status }}"  "success"

          # Preview and notes should be non-empty (passed via env to avoid shell injection)
          if [ -z "$RELEASE_PREVIEW" ]; then
            echo "FAIL [validate]: release-preview is empty"
            fail=1
          else
            echo "OK [validate]: release-preview (non-empty)"
          fi

          if [ -z "$RELEASE_NOTES" ]; then
            echo "FAIL [validate]: release-notes is empty"
            fail=1
          else
            echo "OK [validate]: release-notes (non-empty)"
          fi

          exit $fail
        shell: bash

  # ── validate via GITHUB_HEAD_REF fallback (simulated PR checkout) ────────────
  #
  # Simulates a real GitHub Actions PR workflow where actions/checkout creates a
  # detached HEAD (merge commit) and GITHUB_HEAD_REF is set to the PR head
  # branch. We replicate this by:
  #   1. Creating a release/4.1.0 branch and injecting its name into GITHUB_ENV
  #      (so subsequent steps see GITHUB_HEAD_REF=release/4.1.0)
  #   2. Detaching HEAD so git auto-detection would fail without the fallback
  #   3. Running the action with no branch input — it must use GITHUB_HEAD_REF

  test-validate-github-head-ref-fallback:
    name: validate GITHUB_HEAD_REF fallback (simulated PR)
    needs: [test-validate-single-repo]
    # Only runs under a pull_request event — use the dedicated poe task:
    #   poe test-action-validate-pr
    # which invokes act with a PR event payload so GITHUB_HEAD_REF is set by
    # the runner, matching real GitHub Actions behaviour.
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up git history and simulate PR detached-HEAD checkout
        run: |
          git config user.email "test@example.com"
          git config user.name "Test"
          git tag 4.0.0
          git commit --allow-empty -m "feat: new capability"
          # Create the release branch, then detach HEAD to mimic what
          # actions/checkout does on a pull_request event.  GITHUB_HEAD_REF
          # is set to release/4.1.0 by act via the PR event payload — we do
          # NOT set it manually here.
          git checkout -b release/4.1.0
          git checkout --detach HEAD
        shell: bash

      - name: Write test cliff.toml (no GitHub remote)
        run: |
          cat > cliff.toml << 'TOML'
          [changelog]
          body = """
          {% if version %}## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
          {% else %}## [unreleased]
          {% endif %}
          {% for group, commits in commits | group_by(attribute="group") %}
          ### {{ group | striptags | trim | upper_first }}
          {% for commit in commits %}
          - {% if commit.scope %}*({{ commit.scope }})* {% endif %}{{ commit.message | upper_first }}
          {% endfor %}
          {% endfor %}
          """
          trim = true
          render_always = true

          [git]
          conventional_commits = true
          filter_unconventional = true
          commit_parsers = [
            { message = "^feat", group = "Features" },
            { message = "^fix", group = "Bug Fixes" },
            { message = "^chore\\(release\\):", skip = true },
            { message = ".*", group = "Other" },
          ]
          filter_commits = false
          topo_order_commits = true
          sort_commits = "oldest"
          TOML
        shell: bash

      - name: Run action (validate — no branch input, GITHUB_HEAD_REF=release/4.1.0)
        id: releez
        uses: ./
        with:
          mode: validate
          post-comment: 'false'
          # Intentionally no branch input — action must use GITHUB_HEAD_REF

      - name: Assert outputs (validate GITHUB_HEAD_REF fallback)
        run: |
          fail=0

          assert_eq() {
            local name="$1" actual="$2" expected="$3"
            if [ "$actual" = "$expected" ]; then
              echo "OK [validate-head-ref]: $name"
            else
              echo "FAIL [validate-head-ref]: $name"
              printf '  expected: %q\n' "$expected"
              printf '  actual:   %q\n' "$actual"
              fail=1
            fi
          }

          assert_eq "release-version"    "${{ steps.releez.outputs.release-version }}"    "4.1.0"
          assert_eq "validation-status"  "${{ steps.releez.outputs.validation-status }}"  "success"

          exit $fail
        shell: bash

  # ── Monorepo validate ────────────────────────────────────────────────────────
  #
  # Validates that a monorepo branch (release/core-2.0.0) is previewed
  # correctly with project-scoped notes.

  test-validate-monorepo:
    name: validate monorepo
    needs: [test-validate-single-repo]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up git history and monorepo config
        run: |
          git config user.email "test@example.com"
          git config user.name "Test"

          mkdir -p packages/core
          echo "# core" > packages/core/README.md
          git add packages/core/README.md
          git commit -m "feat(core): initial core package"

          git tag core-1.0.0
          git commit --allow-empty -m "feat(core): new feature for core"

          cat >> pyproject.toml << 'TOML'

          [[tool.releez.projects]]
          name = "core"
          path = "packages/core"
          tag-prefix = "core-"
          changelog-path = "CHANGELOG.md"
          TOML
        shell: bash

      - name: Write test cliff.toml (no GitHub remote)
        run: |
          cat > cliff.toml << 'TOML'
          [changelog]
          body = """
          {% if version %}## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
          {% else %}## [unreleased]
          {% endif %}
          {% for group, commits in commits | group_by(attribute="group") %}
          ### {{ group | striptags | trim | upper_first }}
          {% for commit in commits %}
          - {% if commit.scope %}*({{ commit.scope }})* {% endif %}{{ commit.message | upper_first }}
          {% endfor %}
          {% endfor %}
          """
          trim = true
          render_always = true

          [git]
          conventional_commits = true
          filter_unconventional = true
          commit_parsers = [
            { message = "^feat", group = "Features" },
            { message = "^fix", group = "Bug Fixes" },
            { message = "^chore\\(release\\):", skip = true },
            { message = ".*", group = "Other" },
          ]
          filter_commits = false
          topo_order_commits = true
          sort_commits = "oldest"
          TOML
        shell: bash

      - name: Run action (validate monorepo)
        id: releez
        uses: ./
        with:
          mode: validate
          branch: 'release/core-2.0.0'
          post-comment: 'false'

      - name: Assert outputs (validate monorepo)
        env:
          RELEASE_PREVIEW: ${{ steps.releez.outputs.release-preview }}
          RELEASE_NOTES: ${{ steps.releez.outputs.release-notes }}
        run: |
          fail=0

          assert_eq() {
            local name="$1" actual="$2" expected="$3"
            if [ "$actual" = "$expected" ]; then
              echo "OK [validate-monorepo]: $name"
            else
              echo "FAIL [validate-monorepo]: $name"
              printf '  expected: %q\n' "$expected"
              printf '  actual:   %q\n' "$actual"
              fail=1
            fi
          }

          assert_eq "release-version"    "${{ steps.releez.outputs.release-version }}"    "core-2.0.0"
          assert_eq "project"            "${{ steps.releez.outputs.project }}"             "core"
          assert_eq "validation-status"  "${{ steps.releez.outputs.validation-status }}"  "success"

          # Preview and notes should be non-empty (passed via env to avoid shell injection)
          if [ -z "$RELEASE_PREVIEW" ]; then
            echo "FAIL [validate-monorepo]: release-preview is empty"
            fail=1
          else
            echo "OK [validate-monorepo]: release-preview (non-empty)"
          fi

          if [ -z "$RELEASE_NOTES" ]; then
            echo "FAIL [validate-monorepo]: release-notes is empty"
            fail=1
          else
            echo "OK [validate-monorepo]: release-notes (non-empty)"
          fi

          exit $fail
        shell: bash
