name: 'Releez Action'
description: 'Unified release automation: create tags, validate PRs, and compute artifact versions'
author: 'hotdog-werx'

branding:
  icon: 'package'
  color: 'blue'

inputs:
  mode:
    description: |
      Action mode:
        finalize         — Create tags and emit version outputs after a release PR is merged
        validate         — Preview and validate a release PR before merge
        version-artifact — Compute artifact versions for build pipelines
        validate-pr-title — Check a PR title against cliff.toml commit parsers
    required: true

  # ── Common inputs ──────────────────────────────────────────────────────────

  releez-version:
    description: |
      Override the releez version to install. Accepts a bare version number
      ("1.2.3" → installs releez==1.2.3) or any specifier accepted by
      "uv tool install" (e.g. "git+https://github.com/hotdog-werx/releez@branch").
      Defaults to the version co-located with this action (same-repo pinning).
    required: false
    default: ''

  is-full-release:
    description: 'Whether this is a full release (not a prerelease). Affects tag creation and version formatting.'
    required: false
    default: 'true'

  alias-versions:
    description: |
      Optional alias version strategy for full releases: none, major, or minor.
      If unset, releez config/defaults are used.
    required: false
    default: ''

  version-override:
    description: 'Explicit version string to use (skips git-cliff auto-detection)'
    required: false
    default: ''

  branch:
    description: |
      Branch name to parse for release detection (finalize and validate modes).
      Defaults to github.head_ref for finalize and current git branch for validate.
      Useful for testing with act.
    required: false
    default: ''

  # ── Finalize mode inputs ───────────────────────────────────────────────────

  dry-run:
    description: '[finalize] Skip tag creation and push (outputs are still computed)'
    required: false
    default: 'false'

  # ── Validate-PR-title mode inputs ─────────────────────────────────────────

  pr-title:
    description: '[validate-pr-title] Commit message / PR title to validate against cliff.toml parsers.'
    required: false
    default: ''

  # ── Validate mode inputs ───────────────────────────────────────────────────

  post-comment:
    description: '[validate] Post a PR comment with the release preview and notes'
    required: false
    default: 'true'

  comment-tag:
    description: '[validate] Identifier for the PR comment (enables updating vs duplicating)'
    required: false
    default: 'releez-validate-release'

  # ── Version-artifact mode inputs ───────────────────────────────────────────

  prerelease-type:
    description: '[version-artifact] Prerelease type: alpha, beta, or rc'
    required: false
    default: 'alpha'

  prerelease-number:
    description: '[version-artifact] Prerelease number (e.g. PR number)'
    required: false
    default: ''

  build-number:
    description: '[version-artifact] Build number (e.g. run number). Defaults to github.run_number.'
    required: false
    default: ${{ github.run_number }}

  detect-from-branch:
    description: '[version-artifact] Auto-detect version from the current release branch'
    required: false
    default: 'false'

  project:
    description: '[version-artifact] Project name for monorepo version detection. Scopes git-cliff to the project path and tag pattern.'
    required: false
    default: ''

outputs:
  # ── Release metadata ───────────────────────────────────────────────────────
  release-version:
    description: 'Detected release version (e.g. "1.2.3" or "core-1.2.3" for monorepo)'
    value: ${{ steps.set-outputs.outputs.release-version }}

  project:
    description: 'Project name for monorepo releases (empty for single-repo)'
    value: ${{ steps.set-outputs.outputs.project }}

  release-notes:
    description: 'Markdown release notes'
    value: ${{ steps.set-outputs.outputs.release-notes }}

  release-preview:
    description: '[validate] Markdown release preview (dry-run output)'
    value: ${{ steps.set-outputs.outputs.release-preview }}

  validation-status:
    description: '[validate] "success" when the release branch parses and previews cleanly'
    value: ${{ steps.set-outputs.outputs.validation-status }}

  # ── Artifact version arrays (newline-separated) ────────────────────────────
  # The first line is always the exact version (e.g. "1.2.3"); alias tags
  # (e.g. "v1", "v1.2") follow on subsequent lines when alias-versions is set.
  semver-versions:
    description: 'Newline-separated semver versions. First line is the exact version; aliases follow.'
    value: ${{ steps.set-outputs.outputs.semver-versions }}

  docker-versions:
    description: 'Newline-separated docker-safe versions. First line is the exact version; aliases follow.'
    value: ${{ steps.set-outputs.outputs.docker-versions }}

  pep440-versions:
    description: 'Newline-separated PEP 440 versions. First line is the exact version (aliases not supported by PEP 440).'
    value: ${{ steps.set-outputs.outputs.pep440-versions }}

runs:
  using: 'composite'
  steps:

    # ── Install toolchain ────────────────────────────────────────────────────
    - name: Check for uv
      id: check-uv
      shell: bash
      run: |
        if command -v uv >/dev/null 2>&1; then
          echo "installed=true" >> "$GITHUB_OUTPUT"
        else
          echo "installed=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Install uv
      if: steps.check-uv.outputs.installed == 'false'
      uses: astral-sh/setup-uv@v7

    - name: Install releez and git-cliff
      shell: bash
      run: |
        RELEEZ_OVERRIDE="${{ inputs.releez-version }}"

        if [ -n "$RELEEZ_OVERRIDE" ]; then
          # Explicit override: always install the requested version.
          # Bare version numbers (e.g. "1.2.3") are treated as PyPI versions;
          # anything else (git+https://, http://, paths) is passed through as-is.
          case "$RELEEZ_OVERRIDE" in
            [0-9]*) uv tool install "releez==${RELEEZ_OVERRIDE}" ;;
            *)      uv tool install "$RELEEZ_OVERRIDE" ;;
          esac
        elif ! command -v releez >/dev/null 2>&1; then
          # The action lives in the same repo as the CLI, so github.action_path
          # always points to the exact tagged source — install directly from it.
          RELEEZ_VERSION=$(grep '^version = ' "${{ github.action_path }}/pyproject.toml" \
            | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "Installing releez ${RELEEZ_VERSION} from action source"
          uv tool install "${{ github.action_path }}"
        fi

        # git-cliff is a required runtime dependency for changelog/notes generation
        if ! command -v git-cliff >/dev/null 2>&1; then
          uv tool install git-cliff
        fi

    # ── Validate mode input ──────────────────────────────────────────────────

    - name: Validate mode
      shell: bash
      run: |
        case "${{ inputs.mode }}" in
          finalize|validate|version-artifact|validate-pr-title) ;;
          *)
            echo "::error::Invalid mode '${{ inputs.mode }}'. Must be: finalize, validate, version-artifact, or validate-pr-title" >&2
            exit 1
            ;;
        esac

    # ── FINALIZE MODE ────────────────────────────────────────────────────────

    - name: '[finalize] Detect release from branch'
      id: finalize-detect
      if: inputs.mode == 'finalize'
      shell: bash
      run: |
        BRANCH="${{ inputs.branch || github.head_ref }}"
        RELEASE_INFO=$(releez release detect-from-branch --branch "$BRANCH")
        echo "version=$(echo "$RELEASE_INFO" | jq -r '.version')" >> "$GITHUB_OUTPUT"
        echo "semver=$(echo "$RELEASE_INFO" | jq -r '.semver_version')" >> "$GITHUB_OUTPUT"
        echo "project=$(echo "$RELEASE_INFO" | jq -r '.project // ""')" >> "$GITHUB_OUTPUT"

    - name: '[finalize] Generate release notes'
      id: finalize-notes
      if: inputs.mode == 'finalize'
      env:
        FINALIZE_PROJECT: ${{ steps.finalize-detect.outputs.project }}
      shell: bash
      run: |
        PROJECT_FLAG=""
        if [ -n "$FINALIZE_PROJECT" ]; then
          PROJECT_FLAG="--project $FINALIZE_PROJECT"
        fi
        # shellcheck disable=SC2086
        NOTES=$(releez release notes \
          --version-override "${{ steps.finalize-detect.outputs.version }}" \
          $PROJECT_FLAG)
        {
          echo "content<<EOF"
          echo "$NOTES"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"

    - name: '[finalize] Create release tags'
      if: inputs.mode == 'finalize' && inputs.dry-run != 'true'
      env:
        FINALIZE_PROJECT: ${{ steps.finalize-detect.outputs.project }}
      shell: bash
      run: |
        PROJECT_FLAG=""
        if [ -n "$FINALIZE_PROJECT" ]; then
          PROJECT_FLAG="--project $FINALIZE_PROJECT"
        fi
        ALIAS_VERSIONS_FLAG=""
        if [ -n "${{ inputs.alias-versions }}" ]; then
          ALIAS_VERSIONS_FLAG="--alias-versions ${{ inputs.alias-versions }}"
        fi
        # shellcheck disable=SC2086
        releez release tag \
          --version-override "${{ steps.finalize-detect.outputs.version }}" \
          $ALIAS_VERSIONS_FLAG \
          $PROJECT_FLAG

    - name: '[finalize] Compute artifact versions'
      id: finalize-versions
      if: inputs.mode == 'finalize'
      env:
        FINALIZE_PROJECT: ${{ steps.finalize-detect.outputs.project }}
      shell: bash
      run: |
        # Use semver (tag prefix stripped) for artifact version computation
        PROJECT_FLAG=""
        if [ -n "$FINALIZE_PROJECT" ]; then
          PROJECT_FLAG="--project $FINALIZE_PROJECT"
        fi
        ALIAS_VERSIONS_FLAG=""
        if [ -n "${{ inputs.alias-versions }}" ]; then
          ALIAS_VERSIONS_FLAG="--alias-versions ${{ inputs.alias-versions }}"
        fi
        IS_FULL_RELEASE_FLAG="--no-is-full-release"
        if [ "${{ inputs.is-full-release }}" = "true" ]; then
          IS_FULL_RELEASE_FLAG="--is-full-release"
        fi
        # shellcheck disable=SC2086
        VERSIONS_JSON=$(releez version artifact \
          --version-override "${{ steps.finalize-detect.outputs.semver }}" \
          $ALIAS_VERSIONS_FLAG \
          $PROJECT_FLAG \
          $IS_FULL_RELEASE_FLAG)
        {
          echo "json<<EOF"
          echo "$VERSIONS_JSON"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"

    # ── VALIDATE MODE ────────────────────────────────────────────────────────

    - name: '[validate] Detect release from branch'
      id: validate-detect
      if: inputs.mode == 'validate'
      shell: bash
      run: |
        # Resolve branch: explicit input > GITHUB_HEAD_REF (PR) > git detection
        BRANCH="${{ inputs.branch }}"
        if [ -z "$BRANCH" ] && [ -n "$GITHUB_HEAD_REF" ]; then
          BRANCH="$GITHUB_HEAD_REF"
        fi
        if [ -n "$BRANCH" ]; then
          RELEASE_INFO=$(releez release detect-from-branch --branch "$BRANCH")
        else
          RELEASE_INFO=$(releez release detect-from-branch)
        fi
        echo "version=$(echo "$RELEASE_INFO" | jq -r '.version')" >> "$GITHUB_OUTPUT"
        echo "semver=$(echo "$RELEASE_INFO" | jq -r '.semver_version')" >> "$GITHUB_OUTPUT"
        echo "project=$(echo "$RELEASE_INFO" | jq -r '.project // ""')" >> "$GITHUB_OUTPUT"

    - name: '[validate] Preview release'
      id: validate-preview
      if: inputs.mode == 'validate'
      env:
        VALIDATE_PROJECT: ${{ steps.validate-detect.outputs.project }}
      shell: bash
      run: |
        PROJECT_FLAG=""
        if [ -n "$VALIDATE_PROJECT" ]; then
          PROJECT_FLAG="--project $VALIDATE_PROJECT"
        fi
        # shellcheck disable=SC2086
        PREVIEW=$(releez release preview \
          --version-override "${{ steps.validate-detect.outputs.version }}" \
          $PROJECT_FLAG)
        {
          echo "content<<EOF"
          echo "$PREVIEW"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"

    - name: '[validate] Generate release notes'
      id: validate-notes
      if: inputs.mode == 'validate'
      env:
        VALIDATE_PROJECT: ${{ steps.validate-detect.outputs.project }}
      shell: bash
      run: |
        PROJECT_FLAG=""
        if [ -n "$VALIDATE_PROJECT" ]; then
          PROJECT_FLAG="--project $VALIDATE_PROJECT"
        fi
        # shellcheck disable=SC2086
        NOTES=$(releez release notes \
          --version-override "${{ steps.validate-detect.outputs.version }}" \
          $PROJECT_FLAG)
        {
          echo "content<<EOF"
          echo "$NOTES"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"

    - name: '[validate] Comment on PR'
      if: inputs.mode == 'validate' && inputs.post-comment == 'true'
      uses: thollander/actions-comment-pull-request@v3
      with:
        comment-tag: ${{ inputs.comment-tag }}
        mode: recreate
        message: |
          ## Releez: Release Preview

          ${{ steps.validate-preview.outputs.content }}

          ## Releez: Release Notes

          ${{ steps.validate-notes.outputs.content }}

    # ── VERSION-ARTIFACT MODE ────────────────────────────────────────────────

    - name: '[version-artifact] Detect from branch'
      id: va-detect
      if: inputs.mode == 'version-artifact' && inputs.detect-from-branch == 'true'
      continue-on-error: true
      shell: bash
      run: |
        if [ -n "${{ inputs.branch }}" ]; then
          RELEASE_INFO=$(releez release detect-from-branch --branch "${{ inputs.branch }}")
        else
          RELEASE_INFO=$(releez release detect-from-branch)
        fi
        echo "version=$(echo "$RELEASE_INFO" | jq -r '.version')" >> "$GITHUB_OUTPUT"
        echo "semver=$(echo "$RELEASE_INFO" | jq -r '.semver_version')" >> "$GITHUB_OUTPUT"
        echo "project=$(echo "$RELEASE_INFO" | jq -r '.project // ""')" >> "$GITHUB_OUTPUT"

    - name: '[version-artifact] Compute versions'
      id: va-compute
      if: inputs.mode == 'version-artifact'
      env:
        DETECTED_PROJECT: ${{ steps.va-detect.outputs.project }}
      shell: bash
      run: |
        # Resolve version: explicit override → plain semver from branch detection → git-cliff
        # Uses semver (tag prefix stripped) so version artifact receives a valid semver
        VERSION="${{ inputs.version-override || steps.va-detect.outputs.semver }}"

        VERSION_FLAG=""
        if [ -n "$VERSION" ]; then
          VERSION_FLAG="--version-override $VERSION"
        fi

        PROJECT_NAME="${{ inputs.project }}"
        if [ -z "$PROJECT_NAME" ] && [ -n "$DETECTED_PROJECT" ]; then
          PROJECT_NAME="$DETECTED_PROJECT"
        fi

        PROJECT_FLAG=""
        if [ -n "$PROJECT_NAME" ]; then
          PROJECT_FLAG="--project $PROJECT_NAME"
        fi
        ALIAS_VERSIONS_FLAG=""
        if [ -n "${{ inputs.alias-versions }}" ]; then
          ALIAS_VERSIONS_FLAG="--alias-versions ${{ inputs.alias-versions }}"
        fi

        IS_FULL_RELEASE_FLAG="--no-is-full-release"
        PRERELEASE_FLAGS=""
        if [ "${{ inputs.is-full-release }}" = "true" ]; then
          IS_FULL_RELEASE_FLAG="--is-full-release"
        else
          PRERELEASE_FLAGS="--prerelease-type ${{ inputs.prerelease-type }}"
          if [ -n "${{ inputs.prerelease-number }}" ]; then
            PRERELEASE_FLAGS="$PRERELEASE_FLAGS --prerelease-number ${{ inputs.prerelease-number }}"
          fi
          if [ -n "${{ inputs.build-number }}" ]; then
            PRERELEASE_FLAGS="$PRERELEASE_FLAGS --build-number ${{ inputs.build-number }}"
          fi
        fi

        # shellcheck disable=SC2086
        VERSIONS_JSON=$(releez version artifact \
          $VERSION_FLAG \
          $PROJECT_FLAG \
          $ALIAS_VERSIONS_FLAG \
          $IS_FULL_RELEASE_FLAG \
          $PRERELEASE_FLAGS)

        {
          echo "json<<EOF"
          echo "$VERSIONS_JSON"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"

    # ── VALIDATE-PR-TITLE MODE ───────────────────────────────────────────────

    - name: '[validate-pr-title] Validate PR title against cliff.toml parsers'
      if: inputs.mode == 'validate-pr-title'
      shell: bash
      run: releez validate commit-message "${{ inputs.pr-title }}"

    # ── AGGREGATE OUTPUTS ────────────────────────────────────────────────────

    - name: Set outputs
      id: set-outputs
      if: always()
      env:
        # Pass step outputs via env to avoid quoting/escaping issues with
        # multiline values inside a shell run block
        FINALIZE_VERSION: ${{ steps.finalize-detect.outputs.version }}
        FINALIZE_PROJECT: ${{ steps.finalize-detect.outputs.project }}
        FINALIZE_NOTES: ${{ steps.finalize-notes.outputs.content }}
        FINALIZE_JSON: ${{ steps.finalize-versions.outputs.json }}
        VALIDATE_VERSION: ${{ steps.validate-detect.outputs.version }}
        VALIDATE_PROJECT: ${{ steps.validate-detect.outputs.project }}
        VALIDATE_NOTES: ${{ steps.validate-notes.outputs.content }}
        VALIDATE_PREVIEW: ${{ steps.validate-preview.outputs.content }}
        VA_VERSION: ${{ steps.va-detect.outputs.version }}
        VA_PROJECT: ${{ steps.va-detect.outputs.project }}
        VA_JSON: ${{ steps.va-compute.outputs.json }}
      shell: bash
      run: |
        MODE="${{ inputs.mode }}"

        # Select per-mode outputs
        case "$MODE" in
          finalize)
            VERSION="$FINALIZE_VERSION"
            PROJECT="$FINALIZE_PROJECT"
            VERSIONS_JSON="$FINALIZE_JSON"
            NOTES="$FINALIZE_NOTES"
            PREVIEW=""
            ;;
          validate)
            VERSION="$VALIDATE_VERSION"
            PROJECT="$VALIDATE_PROJECT"
            VERSIONS_JSON=""
            NOTES="$VALIDATE_NOTES"
            PREVIEW="$VALIDATE_PREVIEW"
            ;;
          version-artifact)
            # Primary source: branch detection (if detect-from-branch=true)
            VERSION="$VA_VERSION"
            PROJECT="$VA_PROJECT"
            VERSIONS_JSON="$VA_JSON"
            NOTES=""
            PREVIEW=""
            # Override with project metadata from JSON when --project was used.
            # The CLI embeds release_version (e.g. "core-0.2.0") and project
            # in the JSON output when scoped to a monorepo project.
            if [ -n "$VERSIONS_JSON" ]; then
              JSON_RELEASE_VERSION=$(printf '%s' "$VERSIONS_JSON" | jq -r '.release_version // empty')
              JSON_PROJECT=$(printf '%s' "$VERSIONS_JSON" | jq -r '.project // empty')
              [ -n "$JSON_RELEASE_VERSION" ] && VERSION="$JSON_RELEASE_VERSION"
              [ -n "$JSON_PROJECT" ] && PROJECT="$JSON_PROJECT"
            fi
            ;;
          validate-pr-title)
            VERSION=""
            PROJECT=""
            VERSIONS_JSON=""
            NOTES=""
            PREVIEW=""
            ;;
        esac

        echo "release-version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "project=$PROJECT" >> "$GITHUB_OUTPUT"

        {
          printf 'release-notes<<EOF\n%s\nEOF\n' "$NOTES"
          printf 'release-preview<<EOF\n%s\nEOF\n' "$PREVIEW"
        } >> "$GITHUB_OUTPUT"

        # Parse JSON version arrays into newline-separated outputs.
        # The first entry is always the exact version; aliases follow.
        SEMVER_VERSIONS=""
        DOCKER_VERSIONS=""
        PEP440_VERSIONS=""

        if [ -n "$VERSIONS_JSON" ]; then
          SEMVER_VERSIONS=$(printf '%s' "$VERSIONS_JSON" | jq -r '.semver | join("\n")')
          DOCKER_VERSIONS=$(printf '%s' "$VERSIONS_JSON" | jq -r '.docker | join("\n")')
          PEP440_VERSIONS=$(printf '%s' "$VERSIONS_JSON" | jq -r '.pep440 | join("\n")')
        fi

        {
          printf 'semver-versions<<EOF\n%s\nEOF\n' "$SEMVER_VERSIONS"
          printf 'docker-versions<<EOF\n%s\nEOF\n' "$DOCKER_VERSIONS"
          printf 'pep440-versions<<EOF\n%s\nEOF\n' "$PEP440_VERSIONS"
        } >> "$GITHUB_OUTPUT"

        echo "validation-status=success" >> "$GITHUB_OUTPUT"
