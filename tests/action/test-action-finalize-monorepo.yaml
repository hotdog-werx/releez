name: Test Action — finalize monorepo

# Verifies finalize mode for monorepo projects: the project name is surfaced,
# artifact versions use plain semver (tag prefix stripped), and the first
# release (no prior tags) works without manual bootstrapping.
#
# Run manually or via act:
#   act workflow_dispatch -W tests/action/test-action-finalize-monorepo.yaml
on:
  workflow_dispatch:
  workflow_call:

jobs:

  # ── Monorepo dry-run ─────────────────────────────────────────────────────────
  #
  # Verifies that a monorepo-prefixed branch (release/core-1.1.0) is detected
  # correctly: the project name is surfaced and artifact versions use the plain
  # semver (not the prefixed version).
  test-finalize-dry-run-monorepo:
    name: finalize dry-run monorepo
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up git history and monorepo config
        run: |
          git config user.email "test@example.com"
          git config user.name "Test"

          # Create a minimal monorepo project directory
          mkdir -p packages/core
          echo "# core" > packages/core/README.md
          git add packages/core/README.md
          git commit -m "feat(core): initial core package"

          # Tag with the monorepo prefix
          git tag core-1.0.0
          git commit --allow-empty -m "feat(core): add feature"

          # Write a releez config that declares the core project
          cat >> pyproject.toml << 'TOML'

          [[tool.releez.projects]]
          name = "core"
          path = "packages/core"
          tag-prefix = "core-"
          changelog-path = "CHANGELOG.md"
          TOML
        shell: bash

      - name: Write test cliff.toml (no GitHub remote)
        run: |
          cat > cliff.toml << 'TOML'
          [changelog]
          body = """
          {% if version %}## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
          {% else %}## [unreleased]
          {% endif %}
          {% for group, commits in commits | group_by(attribute="group") %}
          ### {{ group | striptags | trim | upper_first }}
          {% for commit in commits %}
          - {% if commit.scope %}*({{ commit.scope }})* {% endif %}{{ commit.message | upper_first }}
          {% endfor %}
          {% endfor %}
          """
          trim = true
          render_always = true

          [git]
          conventional_commits = true
          filter_unconventional = true
          commit_parsers = [
            { message = "^feat", group = "Features" },
            { message = "^fix", group = "Bug Fixes" },
            { message = "^chore\\(release\\):", skip = true },
            { message = ".*", group = "Other" },
          ]
          filter_commits = false
          topo_order_commits = true
          sort_commits = "oldest"
          TOML
        shell: bash

      - name: Run action (finalize monorepo dry-run)
        id: releez
        uses: ./
        with:
          mode: finalize
          branch: 'release/core-1.1.0'
          is-full-release: 'true'
          alias-versions: 'none'
          dry-run: 'true'

      - name: Assert outputs (finalize monorepo dry-run)
        env:
          RELEASE_NOTES: ${{ steps.releez.outputs.release-notes }}
        run: |
          fail=0

          assert_eq() {
            local name="$1" actual="$2" expected="$3"
            if [ "$actual" = "$expected" ]; then
              echo "OK [finalize-monorepo]: $name"
            else
              echo "FAIL [finalize-monorepo]: $name"
              printf '  expected: %q\n' "$expected"
              printf '  actual:   %q\n' "$actual"
              fail=1
            fi
          }

          # release-version is the full prefixed version (identifies project+version)
          assert_eq "release-version" "${{ steps.releez.outputs.release-version }}" "core-1.1.0"
          assert_eq "project"         "${{ steps.releez.outputs.project }}"          "core"
          # artifact versions use plain semver (tag prefix stripped)
          assert_eq "semver-versions" "${{ steps.releez.outputs.semver-versions }}"  "1.1.0"
          assert_eq "docker-versions" "${{ steps.releez.outputs.docker-versions }}"  "1.1.0"
          assert_eq "pep440-versions" "${{ steps.releez.outputs.pep440-versions }}"  "1.1.0"

          # Release notes should be non-empty (feat commit since core-1.0.0)
          if [ -z "$RELEASE_NOTES" ]; then
            echo "FAIL [finalize-monorepo]: release-notes is empty"
            fail=1
          else
            echo "OK [finalize-monorepo]: release-notes (non-empty)"
          fi

          exit $fail
        shell: bash

  # ── Monorepo first release (no previous tags) ─────────────────────────────────
  #
  # Verifies that finalize mode works for the very first release of a monorepo
  # project — when no core-* tags exist yet. The version comes from the branch
  # name (release/core-0.1.0) so git-cliff is invoked with an explicit --tag,
  # not --bumped-version, and must not fail due to the missing baseline.

  test-finalize-dry-run-monorepo-first-release:
    name: finalize dry-run monorepo first release (no prior tags)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up git history and monorepo config (no core-* tag)
        run: |
          git config user.email "test@example.com"
          git config user.name "Test"

          mkdir -p packages/core
          echo "# core" > packages/core/README.md
          git add packages/core/README.md
          git commit -m "feat(core): initial core package"
          # Intentionally NO core-* tag — this is the very first release

          cat >> pyproject.toml << 'TOML'

          [[tool.releez.projects]]
          name = "core"
          path = "packages/core"
          tag-prefix = "core-"
          changelog-path = "CHANGELOG.md"
          TOML
        shell: bash

      - name: Write test cliff.toml (no GitHub remote)
        run: |
          cat > cliff.toml << 'TOML'
          [changelog]
          body = """
          {% if version %}## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
          {% else %}## [unreleased]
          {% endif %}
          {% for group, commits in commits | group_by(attribute="group") %}
          ### {{ group | striptags | trim | upper_first }}
          {% for commit in commits %}
          - {% if commit.scope %}*({{ commit.scope }})* {% endif %}{{ commit.message | upper_first }}
          {% endfor %}
          {% endfor %}
          """
          trim = true
          render_always = true

          [git]
          conventional_commits = true
          filter_unconventional = true
          commit_parsers = [
            { message = "^feat", group = "Features" },
            { message = "^fix", group = "Bug Fixes" },
            { message = "^chore\\(release\\):", skip = true },
            { message = ".*", group = "Other" },
          ]
          filter_commits = false
          topo_order_commits = true
          sort_commits = "oldest"
          TOML
        shell: bash

      - name: Run action (finalize monorepo first-release dry-run)
        id: releez
        uses: ./
        with:
          mode: finalize
          branch: 'release/core-0.1.0'
          is-full-release: 'true'
          alias-versions: 'none'
          dry-run: 'true'

      - name: Assert outputs (finalize monorepo first-release dry-run)
        env:
          RELEASE_NOTES: ${{ steps.releez.outputs.release-notes }}
        run: |
          fail=0

          assert_eq() {
            local name="$1" actual="$2" expected="$3"
            if [ "$actual" = "$expected" ]; then
              echo "OK [finalize-monorepo-first-release]: $name"
            else
              echo "FAIL [finalize-monorepo-first-release]: $name"
              printf '  expected: %q\n' "$expected"
              printf '  actual:   %q\n' "$actual"
              fail=1
            fi
          }

          assert_eq "release-version" "${{ steps.releez.outputs.release-version }}" "core-0.1.0"
          assert_eq "project"         "${{ steps.releez.outputs.project }}"          "core"
          # artifact versions must use plain semver (tag prefix stripped)
          assert_eq "semver-versions" "${{ steps.releez.outputs.semver-versions }}"  "0.1.0"
          assert_eq "docker-versions" "${{ steps.releez.outputs.docker-versions }}"  "0.1.0"
          assert_eq "pep440-versions" "${{ steps.releez.outputs.pep440-versions }}"  "0.1.0"

          # Release notes should include the initial feat commit
          if [ -z "$RELEASE_NOTES" ]; then
            echo "FAIL [finalize-monorepo-first-release]: release-notes is empty"
            fail=1
          else
            echo "OK [finalize-monorepo-first-release]: release-notes (non-empty)"
          fi

          exit $fail
        shell: bash
