# Codecov configuration
# https://docs.codecov.com/docs/codecov-yaml

coverage:
  status:
    project:
      default:
        target: auto
        threshold: 0%
        informational: false

    patch:
      default:
        # Require 100% coverage on changed lines (the diff)
        target: 100%
        threshold: 0%
        informational: false

comment:
  layout: 'reach,diff,flags,tree'
  behavior: default
  require_changes: false
